version: '3.8'

# 两种使用方式：
# 1. 本地构建：使用当前目录的Dockerfile构建镜像
# 2. 使用已发布镜像：直接使用Docker Hub上的官方镜像

services:
  smart-blessings:
    # ==================== 本地构建模式 ====================
    # 从当前目录的Dockerfile构建镜像
    build: .
    # 构建后生成的本地镜像名称
    image: smart-blessings:latest
    # =====================================================
    
    # =================== 使用已发布镜像 ===================
    # 如需使用Docker Hub上的已构建镜像，注释上面的build和image，
    # 取消注释下面的image行：
    # image: ceilwong/smart-blessings:latest
    # =====================================================
    
    # 端口映射：宿主机端口8080 → 容器内PORT变量（默认3000）
    ports:
      - "8080:${PORT:-3000}"
    # 从.env文件加载环境变量
    env_file:
      - .env
    # 容器崩溃自动重启（生产环境建议启用）
    restart: always
    # 容器名称（方便管理）
    container_name: smart-blessings-app