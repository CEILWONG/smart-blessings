<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✨ AI 节日祝福生成器</title>
  <style>
    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #ffeaa7, #fab1a0);
      padding: 20px;
      margin: 0;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    h1 {
      text-align: center;
      color: #e17055;
      margin-bottom: 25px;
      font-size: 24px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: bold;
    }
    input[type="text"], select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .btn {
      background: #e17055;
      color: white;
      border: none;
      padding: 12px 20px;
      margin: 15px 5px 0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      width: calc(50% - 12px);
      transition: background 0.3s;
    }
    .btn:hover {
      background: #d63031;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      background: #fff9db;
      border-left: 4px solid #fdcb6e;
      border-radius: 6px;
      font-size: 17px;
      line-height: 1.6;
      min-height: 100px;
      word-break: break-word;
    }
    @media (max-width: 500px) {
      .btn {
        width: 100%;
        margin: 10px 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ AI 马年祝福生成器</h1>

    <label for="name">对方称呼（如：张老师、李阿姨、王总）：</label>
    <input type="text" id="name" placeholder="请输入称呼" value="亲爱的您" />

    <!-- 修改点1: 扩充了身份选项 -->
    <label for="identity">对方身份：</label>
    <select id="identity">
      <option value="长辈">长辈（父母、祖辈等）</option>
      <option value="平辈">平辈（朋友、同事、兄弟姐妹）</option>
      <option value="晚辈">晚辈（孩子、学生等）</option>
      <option value="领导">领导/上级</option>
      <option value="客户">客户/合作伙伴</option>
      <option value="爱人">爱人/伴侣</option>
      <option value="同学">同学/老友</option>
      <option value="老师">老师/恩师</option>
    </select>

    <!-- 修改点2: 新增了风格选择模块 -->
    <label for="style">祝福风格：</label>
    <select id="style">
      <option value="真诚用心">真诚用心（走心、温暖）</option>
      <option value="幽默搞怪">幽默搞怪（搞笑、有趣）</option>
      <option value="传统吉祥">传统吉祥（成语、对仗）</option>
<!--       <option value="文艺清新">文艺清新（诗意、唯美）</option> -->
      <option value="职场商务">职场商务（大气、得体）</option>
      <option value="简短精炼">简短精炼（直白、高效）</option>
    </select>

    <label for="day">节日日期：</label>
    <select id="day">
      <option value="除夕">除夕</option>
      <option value="大年初一">大年初一</option>
      <option value="大年初二">大年初二</option>
      <option value="大年初三">大年初三</option>
      <option value="大年初四">大年初四</option>
      <option value="大年初五">大年初五</option>
      <option value="大年初六">大年初六</option>
    </select>

    <button class="btn" onclick="generate()">🎉 生成祝福语</button>
    <button class="btn" onclick="copyText()" style="background:#00b894;">📋 复制祝福语</button>

    <div id="result">✨ 输入信息后，点击“生成祝福语”，AI 将为您创作专属马年祝福！</div>
  </div>

  <script>
    async function generate() {
      const name = document.getElementById('name').value.trim() || '亲爱的您';
      const identity = document.getElementById('identity').value;
      const day = document.getElementById('day').value;
      // 修改点3: 获取风格值
      const style = document.getElementById('style').value;
      const resultDiv = document.getElementById('result');

      resultDiv.innerText = '🐎 正在请qwen3-max为您创作祝福语...';

      try {
        const response = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            name, 
            identity, 
            day,
            style // 修改点4: 将风格加入请求体
          })
        });

        const data = await response.json();

        if (data.success) {
          resultDiv.innerText = data.blessing;
        } else {
          resultDiv.innerText = '❌ 生成失败，请稍后重试（可能配额不足）';
        }
      } catch (err) {
        console.error(err);
        resultDiv.innerText = '⚠️ 网络错误，请确保服务正常运行';
      }
    }

    async function copyText() {
      const text = document.getElementById('result').innerText;
      if (text.includes('正在请通义千问') || text.includes('点击“生成')) {
        alert('请先生成祝福语！');
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        alert('✅ 祝福语已复制到剪贴板！');
      } catch (err) {
        alert('❌ 复制失败，请手动复制。');
      }
    }
  </script>
</body>
</html>
